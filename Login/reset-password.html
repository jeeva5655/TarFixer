<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TarFixer - Reset Password</title>

<!-- API Client -->
<script src="../api-client.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* BACKGROUND IMAGE */
    #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 140%;
        height: 100%;
        object-fit: cover;
        object-position: 10% center;
        filter: brightness(80%);
        z-index: -3;
    }

    #blur-right {
        position: fixed;
        right: 0;
        top: 0;
        width: 60%;
        height: 100%;
        backdrop-filter: blur(4px);
        background: linear-gradient(to left, rgba(0,0,0,0.55), rgba(0,0,0,0.15));
        z-index: -2;
    }

    #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.25);
        z-index: -1;
    }

    /* TITLE */
    .welcome-title {
        margin-top: 40px;
        font-size: 26px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 1px;
        z-index: 10;
        color: #e6fff7;
        text-shadow:
            0 0 3px #0fa,
            0 0 6px #0fa,
            0 0 12px #0fa,
            0 0 24px rgba(0, 255, 170, 0.4),
            0 0 36px rgba(0, 255, 170, 0.3);
    }

    .card {
        width: 90%;
        max-width: 340px;
        background: rgba(255,255,255,0.14);
        padding: 28px;
        border-radius: 18px;
        backdrop-filter: blur(13px);
        box-shadow: 0 0 28px rgba(255,255,255,0.25);
        text-align: center;
        color: white;
        margin-top: 20px;
    }

    h2 {
        margin-bottom: 8px;
        font-size: 26px;
        color: white;
    }

    .subtitle {
        font-size: 13px;
        color: rgba(255,255,255,0.8);
        margin-bottom: 20px;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 10px;
        font-size: 14px;
        color: white;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-top: 5px;
        background: rgba(255,255,255,0.9);
        font-size: 15px;
        box-sizing: border-box;
    }

    input:focus {
        outline: none;
        background: white;
    }

    .password-box {
        position: relative;
        width: 100%;
    }

    .password-box img {
        width: 22px;
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        opacity: 0.6;
    }

    .password-box img:hover {
        opacity: 1;
    }

    .error {
        color: #ff6b6b;
        font-size: 12px;
        margin-top: 2px;
        text-align: left;
    }

    .success {
        color: #7ef7a1;
        font-size: 13px;
        margin-top: 5px;
        text-align: center;
        background: rgba(126, 247, 161, 0.15);
        padding: 10px;
        border-radius: 8px;
    }

    .main-btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: white;
        color: black;
        font-size: 16px;
        border: none;
        margin-top: 15px;
        cursor: pointer;
    }

    .main-btn:hover {
        background: rgba(255,255,255,0.9);
    }

    .main-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .back-link {
        display: block;
        margin-top: 15px;
        color: #cfe3ff;
        text-decoration: none;
        font-size: 13px;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    .requirements {
        text-align: left;
        font-size: 11px;
        color: rgba(255,255,255,0.8);
        margin-top: 5px;
        line-height: 1.5;
        padding-left: 5px;
    }

    .requirements li {
        list-style: none;
        padding-left: 20px;
        position: relative;
    }

    .requirements li:before {
        content: "•";
        position: absolute;
        left: 5px;
    }
</style>
</head>

<body>

<img id="bg" src="bg.jpg">
<div id="blur-right"></div>
<div id="overlay"></div>

<div class="welcome-title">Reset Your Password</div>

<div class="card">
    <h2>Create New Password</h2>
    <div class="subtitle">Enter your new password below</div>

    <div id="messageContainer"></div>

    <form id="resetForm" onsubmit="handleResetPassword(event)">
        <label>Verification Code</label>
        <input type="text" id="verificationCode" placeholder="Enter 6-digit code from email" maxlength="6" pattern="[0-9]{6}" required>
        <div style="font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 5px; text-align: left;">
            Check your email for the 6-digit verification code
        </div>
        <div id="codeError" class="error"></div>

        <label style="margin-top: 15px;">New Password</label>
        <div class="password-box">
            <input type="password" id="newPassword" placeholder="New Password" required>
            <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" onclick="togglePassword('newPassword')">
        </div>
        <ul class="requirements">
            <li>At least 8 characters</li>
            <li>Include uppercase (A-Z) and lowercase (a-z)</li>
            <li>Include numbers (0-9)</li>
            <li>Include special characters (!@#$%^&*)</li>
        </ul>
        <div id="newPasswordError" class="error"></div>

        <label>Confirm New Password</label>
        <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
            <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" onclick="togglePassword('confirmPassword')">
        </div>
        <div id="confirmPasswordError" class="error"></div>

        <button type="submit" class="main-btn" id="resetBtn">Reset Password</button>
    </form>

    <a href="Choose_login.html" class="back-link">← Back to Login</a>
</div>

<script>
// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('token');

// Check if token exists
if (!resetToken) {
    showMessage('Invalid reset link. Please request a new password reset.', 'error');
    document.getElementById('resetForm').style.display = 'none';
}

function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = (input.type === "password") ? "text" : "password";
}

function isStrongPassword(password) {
    return /[A-Z]/.test(password) &&
           /[a-z]/.test(password) &&
           /[0-9]/.test(password) &&
           /[\W_]/.test(password) &&
           password.length >= 8;
}

function showMessage(message, type) {
    const container = document.getElementById('messageContainer');
    container.innerHTML = `<div class="${type}">${message}</div>`;
}

async function handleResetPassword(event) {
    event.preventDefault();
    
    // Clear previous errors
    document.getElementById('codeError').textContent = '';
    document.getElementById('newPasswordError').textContent = '';
    document.getElementById('confirmPasswordError').textContent = '';
    
    const verificationCode = document.getElementById('verificationCode').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    let valid = true;
    
    // Validate verification code
    if (!/^\d{6}$/.test(verificationCode)) {
        document.getElementById('codeError').textContent = 
            'Please enter a valid 6-digit code';
        valid = false;
    }
    
    // Validate password strength
    if (!isStrongPassword(newPassword)) {
        document.getElementById('newPasswordError').textContent = 
            'Password must meet all requirements above';
        valid = false;
    }
    
    // Validate password match
    if (newPassword !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = 
            'Passwords do not match';
        valid = false;
    }
    
    if (!valid) return;
    
    // Disable button
    const resetBtn = document.getElementById('resetBtn');
    resetBtn.disabled = true;
    resetBtn.textContent = 'Resetting...';
    
    try {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_URL = isLocal ? 'http://localhost:5000/api' : 'https://tarfixer-backend.onrender.com/api';
        const response = await fetch(`${API_URL}/auth/reset-password`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                token: resetToken,
                code: verificationCode,
                password: newPassword
            })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showMessage(data.message || 'Password reset successfully!', 'success');
            document.getElementById('resetForm').style.display = 'none';
            
            // Redirect to login after 3 seconds
            setTimeout(() => {
                window.location.href = 'Choose_login.html';
            }, 3000);
        } else {
            showMessage(data.error || 'Failed to reset password. Please try again.', 'error');
            resetBtn.disabled = false;
            resetBtn.textContent = 'Reset Password';
        }
    } catch (error) {
        console.error('Reset password error:', error);
        showMessage('Failed to reset password. Please try again.', 'error');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
    }
}
</script>

</body>
</html>
