<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>TarFixer — Worker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <!-- API Client -->
  <script src="../api-client.js"></script>

  <style>
    :root{
      --bg:#0b1220; --card: #152639; --accent: #00e6a8; --muted: #bfcbd6;
      --text: #e6f0f2; --border: rgba(255,255,255,0.1);
      --modal-bg: rgba(7,23,40,0.96);
    }
    /* FIXED LIGHT THEME (ONLY VISIBILITY, NO UI CHANGES) */
.light-theme {
  --bg: #ffffff;
  --card: #f9f9f9;
  --accent: #009970;
  --muted: #333333;     /* darker gray so text is visible */
  --text: #000000;      /* strong readable black text */
  --border: #d0d0d0;
  --modal-bg: rgba(255,255,255,0.95);

  /* Buttons readable */
  --btn-text-dark: #ffffff;
}

    body{ margin:0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--text); transition: 0.25s; height: 100vh; overflow: hidden; }
    .container{ display:grid; grid-template-columns: 260px 1fr; height: 100%; }
    .leaflet-control-attribution { display: none !important; }

    /* Sidebar */
    .sidebar{ background: var(--card); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; z-index:100; }
    .brand { font-size: 20px; font-weight: 800; display: flex; gap: 10px; align-items: center; color: var(--accent); margin-bottom: 10px; }
    .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; color: var(--muted); font-weight: 600; display: flex; gap: 10px; align-items: center; }
    .nav-item.active { background: rgba(255,255,255,0.05); color: var(--text); border-left: 3px solid var(--accent); }

    .status-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); margin-top: auto; }
    .toggle-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 16px; }
    .is-avail { background: var(--accent); color: #002; }
    .is-busy { background: #ff3b3b; color: #fff; }

    /* Main */
    .main { padding: 20px; overflow-y: auto; position: relative; display: flex; flex-direction: column; gap: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; }

    .task-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .task-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #000; }
    .task-info { flex: 1; }
    .btn { padding: 10px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-start { background: #3b82f6; color: #fff; }
    .btn-map { background: #ff9800; color: #002; margin-left: 8px; }
    .btn-finish { background: #00c853; color: #002; margin-left: 8px; display:none; } /* hidden until Start Work */

    .history-section { display: none; flex-direction: column; gap: 10px; }
    .history-section.active { display: flex; }
    .history-item { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; }

    /* CAMERA OVERLAY */
    .cam-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 8000; display: none; flex-direction: column; align-items:center; justify-content:center; }
    #cameraView { width: 100%; max-width: 720px; height: 60vh; background: #111; border-radius: 8px; object-fit: cover; }
    .cam-controls { margin-top: 12px; display:flex; gap:12px; align-items:center; justify-content:center; }
    .capture-btn { width: 72px; height: 72px; border-radius: 50%; background: #fff; border: 6px solid #ddd; cursor: pointer; }
    .close-cam-btn { color: #fff; background: rgba(255,255,255,0.05); padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; }

    /* SETTINGS */
    .modal-back { position: fixed; inset: 0; background: var(--modal-bg); z-index: 7000; display: none; align-items: center; justify-content: center; }
    .modal { background: var(--card); width: 90%; max-width: 420px; padding: 18px; border-radius: 12px; border: 1px solid var(--border); }
    .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

    /* THEME SWITCH */
    .theme-switch { position: relative; width: 60px; height: 30px; }
    .theme-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }

    /* Worker Profile Dropdown */
    .worker-profile { display:flex; gap:10px; align-items:center; background: var(--card); padding: 6px 12px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; z-index: 7100; }
    .dropdown-menu { position: absolute; top: 110%; right: 0; width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 7200; padding: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .dropdown-menu.show { display: block; }
    .dropdown-item { padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .dropdown-item:hover { background: rgba(255,255,255,0.03); }

    /* MAP MODAL */
    .map-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .map-modal .box { width: 100%; max-width: 940px; height: 70vh; background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border); }
    #mapModalInner { width: 100%; height: 100%; }
    .close-map-btn { position: absolute; top: 12px; right: 12px; z-index: 6500; background: rgba(0,0,0,0.6); color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }

    @media(max-width: 768px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .map-modal .box { max-width: 95%; height: 60vh; } .cam-modal #cameraView { width: 95%; height: 50vh; } }

<div class="container">
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-helmet-safety"></i> <span data-key="brand">Worker</span></div>

    <div class="status-card" title="Toggle availability">

      <button class="toggle-btn is-avail" id="statusBtn" onclick="toggleStatus()">Go Busy</button>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="header">
      <h2 id="pageTitle" data-key="tasks">My Tasks</h2>

      <div class="worker-profile" id="workerProfileBtn" onclick="toggleProfileDropdown()">

        </div>

        <div class="dropdown-menu" id="profileDropdown" role="menu" aria-hidden="true">
          <div class="dropdown-item" onclick="openSettings(event)"><i class="fa-solid fa-gear"></i> <span data-key="settings">Settings</span></div>
          <div class="dropdown-item" onclick="signOut()" style="color:#ff3b3b"><i class="fa-solid fa-right-from-bracket"></i> <span data-key="signout">Sign Out</span></div>
        </div>
      </div>
    </div>

    <!-- TASKS TAB -->
    <div id="tasksTab">
      <div id="taskList">
        <!-- Example Task (duplicate for more) -->
        <div class="task-card" id="task-TF002">
          <img src="https://via.placeholder.com/150" class="task-img" alt="task image">
          <div class="task-info">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3>TF-002</h3>
              <span class="status-text" style="color:orange; font-weight:bold" data-key="assigned">ASSIGNED</span>
            </div>
            <p style="color:var(--muted); font-size:14px;">OMR Road, Tech Park Gate</p>
            <div>
              <button class="btn btn-start" onclick="startWork(this)" data-key="start">Start Work</button>
              <button class="btn btn-map" onclick="showTaskMap(12.9716,80.2446,'TF-002')" data-key="viewmap">View Map</button>
              <button class="btn btn-finish" onclick="finishAndUpload('TF-002')" id="finish-TF002" data-key="finish">Finish &amp; Upload</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="historyTab" class="history-section" aria-hidden="true">
      <div class="history-item">
        <div><b>TF-001</b> <br><small style="color:var(--muted)">Anna Nagar</small></div>
        <span style="color:var(--accent)">Completed</span>
      </div>
    </div>
  </main>
</div>

<!-- CAMERA MODAL -->
<div class="cam-modal" id="camModal" aria-hidden="true">
  <video id="cameraView" autoplay playsinline></video>
  <div class="cam-controls">
    <button class="close-cam-btn" onclick="closeCamera()" data-key="cancel">Cancel</button>
    <button class="capture-btn" onclick="captureFinalPhoto()" aria-label="capture"></button>
  </div>
</div>

<!-- MAP MODAL -->
<div class="map-modal" id="mapModal" aria-hidden="true">
  <div class="box" role="dialog" aria-modal="true">
    <button class="close-map-btn" onclick="closeMapModal()" data-key="closeMap">Close Map</button>
    <div id="mapModalInner"></div>
  </div>
</div>

<div class="modal-back" id="settingsModal" role="dialog" aria-modal="true">

    <h3 data-key="settings">Settings</h3>

    <div class="settings-row">

        <option value="bn">বাংলা (Bengali)</option>

      </select>
    </div>

    <div class="settings-row">
      <label data-key="theme">Theme</label>
      <label class="theme-switch">
        <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
        <span class="slider round"></span>
      </label>
    </div>

    <button class="btn" style="width:100%; background:var(--accent); color:#002" onclick="closeSettings()" data-key="close">Close</button>
  </div>
</div>

  // Helper to apply translations to all [data-key] elements
  function applyTranslations(lang) {
    const map = TRANSLATIONS[lang] || TRANSLATIONS['en'];
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (map[key]) {
        el.textContent = map[key];
      }
    });
    // set HTML lang attribute for accessibility/screen readers
    document.documentElement.lang = lang;
    // Update status button text as it is dynamic
    updateStatusButtonText();
    // Update the Finish button text specifically (data-key="finish")
    const finishButtons = document.querySelectorAll('.btn-finish');
    finishButtons.forEach(btn => btn.textContent = map.finish || TRANSLATIONS['en'].finish);
  }

  function changeLanguage(lang) {
    currentLang = lang;
    applyTranslations(lang);
  }

  // Initialize with English
  applyTranslations('en');

  function updateStatusButtonText() {
    const btn = document.getElementById('statusBtn');
    if (!btn) return;
    const t = TRANSLATIONS[currentLang] || TRANSLATIONS['en'];
    btn.textContent = isAvailable ? (t.goBusy || 'Go Busy') : (t.goFree || 'Go Available');
  }

  function toggleStatus(forceBusy) {
    if (forceBusy === true) isAvailable = false;
    else if (typeof forceBusy === 'boolean') isAvailable = !forceBusy;
    else isAvailable = !isAvailable;

    const txt = document.getElementById('statusText');
    if (isAvailable) {
      txt.textContent = TRANSLATIONS[currentLang]?.avail || 'Available';
      txt.style.color = 'var(--accent)';
      document.getElementById('statusBtn').className = 'toggle-btn is-avail';
    } else {
      txt.textContent = TRANSLATIONS[currentLang]?.busy || 'Busy';
      txt.style.color = '#ff3b3b';
      document.getElementById('statusBtn').className = 'toggle-btn is-busy';
    }
    updateStatusButtonText();
  }

  // NAV
  function showTab(tab) {
    if (tab === 'tasks') {
      document.getElementById('tasksTab').style.display = 'block';
      document.getElementById('historyTab').classList.remove('active');
      document.querySelector('[data-key="navTasks"]').classList.add('active');
      document.querySelector('[data-key="navHistory"]').classList.remove('active');
    } else {
      document.getElementById('tasksTab').style.display = 'none';
      document.getElementById('historyTab').classList.add('active');
      document.querySelector('[data-key="navTasks"]').classList.remove('active');
      document.querySelector('[data-key="navHistory"]').classList.add('active');
    }
  }

  // PROFILE DROPDOWN
  function toggleProfileDropdown() {
    const dd = document.getElementById('profileDropdown');
    dd.classList.toggle('show');
  }

  // Click outside to close dropdown
  document.addEventListener('click', (e) => {
    const profile = document.getElementById('workerProfileBtn');
    const dropdown = document.getElementById('profileDropdown');
    if (!profile.contains(e.target)) dropdown.classList.remove('show');
  });

  /* SECURE AUTHENTICATION */
  function getSession() {
    try {
      const sessionStr = localStorage.getItem('tarfixer_session');
      if (!sessionStr) return null;
      const signedSession = JSON.parse(sessionStr);
      // Extract actual session data from signed wrapper
      return signedSession.data || signedSession;
    } catch (e) {
      return null;
    }
  }

  async function signOut() {
    if (confirm((TRANSLATIONS[currentLang]?.signout || 'Sign Out') + '?')) {
      await API.logout();
      window.location.href = '../Login/Choose_login.html';
    }
  }
  
  function loadWorkerInfo() {
    const user = API.getUser();
    if (user) {
      document.getElementById('workerName').textContent = user.name || 'Worker';
      document.getElementById('workerEmail').textContent = user.email || '';
      const initials = user.name ? user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'W';
      document.getElementById('workerInitials').textContent = initials;
    }
  }

  async function protectDashboard() {
    // Check if authenticated
    if (!API.isAuthenticated()) {
      console.warn('Not authenticated, redirecting to login');
      window.location.replace('../Login/Choose_login.html?error=not_authenticated');
      return false;
    }

    // Check user type from stored data
    const user = API.getUser();
    if (!user || user.userType !== 'worker') {
      console.warn('Access denied: not a worker');
      await API.logout();
      window.location.replace('../Login/Choose_login.html?error=access_denied');
      return false;
    }
    
    console.log('Worker authenticated, loading dashboard...');
    return true;
  }

  // SETTINGS modal open/close
  function openSettings(e) {
    if(e) e.stopPropagation();
    document.getElementById('profileDropdown').classList.remove('show');
    document.getElementById('settingsModal').style.display = 'flex';
    document.getElementById('settingsModal').setAttribute('aria-hidden','false');
    setTimeout(()=> document.getElementById('langSelect').focus(), 60);
  }
  function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('settingsModal').setAttribute('aria-hidden','true');
  }

  // Click outside settings to close (backdrop)
  const settingsModal = document.getElementById('settingsModal');
  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) closeSettings();
  });

  // THEME
  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    if(taskMap) {
      taskMap.removeLayer(tileLayerModal);
      const isDark = !document.body.classList.contains('light-theme');
      const url = isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
      tileLayerModal = L.tileLayer(url, { maxZoom: 19 }).addTo(taskMap);
    }
  }

  // MAP modal logic
  function showTaskMap(lat, lng, id) {
    const modal = document.getElementById('mapModal');
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden','false');

    if (taskMap) {
      try { taskMap.remove(); } catch (e) {}
      taskMap = null; tileLayerModal = null;
      document.getElementById('mapModalInner').innerHTML = '';
    }

    setTimeout(() => {
      taskMap = L.map('mapModalInner', { attributionControl:false }).setView([lat, lng], 15);
      const isDark = !document.body.classList.contains('light-theme');
      const url = isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
      tileLayerModal = L.tileLayer(url, { maxZoom: 19 }).addTo(taskMap);

      L.circleMarker([lat, lng], {radius:8, fillColor:'#ff9800', color:'#fff', weight:2, fillOpacity:1})
        .addTo(taskMap)
        .bindPopup(id)
        .openPopup();

      setTimeout(()=> taskMap.invalidateSize(), 120);
    }, 80);
  }

  function closeMapModal() {
    const modal = document.getElementById('mapModal');
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden','true');
    if(taskMap) {
      try { taskMap.remove(); } catch(e) {}
      taskMap = null; tileLayerModal = null;
      document.getElementById('mapModalInner').innerHTML = '';
    }
  }

  // close map when clicking backdrop
  const mapModal = document.getElementById('mapModal');
  mapModal.addEventListener('click', (e) => {
    if (e.target === mapModal) closeMapModal();
  });

  // ESC behavior: close modals / camera
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if(document.getElementById('mapModal').style.display === 'flex') closeMapModal();
      if(document.getElementById('settingsModal').style.display === 'flex') closeSettings();
      if(document.getElementById('camModal').style.display === 'flex') closeCamera();
    }
  });

  // START WORK -> show Finish button and set busy
  function startWork(btn) {
    btn.style.display = 'none';
    const card = btn.closest('.task-card');
    const finishBtn = card.querySelector('.btn-finish');
    if (finishBtn) finishBtn.style.display = 'inline-block';
    const statusTextEl = card.querySelector('.status-text');
    if (statusTextEl) { statusTextEl.textContent = (TRANSLATIONS[currentLang]?.assigned || 'ONGOING'); statusTextEl.style.color = '#3b82f6'; }
    toggleStatus(true); // set worker busy
  }

  // FINISH & UPLOAD flow (Option C)
  function finishAndUpload(taskId) {
    currentFinishingTask = taskId;
    openCameraForFinal();
  }

  // CAMERA functions (final photo only)
  function openCameraForFinal() {
    const camModal = document.getElementById('camModal');
    camModal.style.display = 'flex';
    camModal.setAttribute('aria-hidden','false');

    const video = document.getElementById('cameraView');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .then(stream => {
        activeCameraStream = stream;
        video.srcObject = stream;
        video.play().catch(()=>{});
      })
      .catch(err => {
        alert('Camera access denied or not available.');
        closeCamera();
      });
  }

  function closeCamera() {
    const camModal = document.getElementById('camModal');
    camModal.style.display = 'none';
    camModal.setAttribute('aria-hidden','true');
    const video = document.getElementById('cameraView');
    if (video && video.srcObject) {
      const tracks = video.srcObject.getTracks();
      tracks.forEach(t => t.stop());
    }
    activeCameraStream = null;
  }

  // Capture final photo and "upload"
  function captureFinalPhoto() {
    const video = document.getElementById('cameraView');
    if (!video || !video.srcObject) { alert('Camera not ready.'); return; }

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

    if (!navigator.geolocation) {
      alert((TRANSLATIONS[currentLang]?.language ? '' : '') + 'GPS required to attach location. Enable location and try again.');
      return;
    }

    navigator.geolocation.getCurrentPosition((pos) => {
      const payload = {
        taskId: currentFinishingTask,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        timestamp: new Date().toISOString(),
        imageBase64: dataUrl.split(',')[1]
      };

      closeCamera();
      setTimeout(() => {
        alert((TRANSLATIONS[currentLang]?.finish || 'Final repaired photo uploaded to officer.') + '\nTask: ' + payload.taskId + '\nLat: ' + payload.lat.toFixed(4) + '\nLng: ' + payload.lng.toFixed(4));
        markTaskCompleted(payload.taskId, payload.timestamp);
      }, 700);

    }, (err) => {
      alert('GPS permission denied. Please enable location and try again.');
    });
  }

  function markTaskCompleted(taskId, time) {
    const safeId = 'task-' + (taskId || '').replace(/-/g,'');
    const el = document.getElementById(safeId);
    if (el) el.remove();

    const list = document.getElementById('taskList');
    if (!list.querySelector('.task-card')) {
      list.innerHTML = '<div style="text-align:center; color:var(--muted); margin-top:40px;">No pending tasks.</div>';
    }

    const historyTab = document.getElementById('historyTab');
    const timeLabel = time ? new Date(time).toLocaleString() : 'Just Now';
    historyTab.insertAdjacentHTML('afterbegin', `<div class="history-item"><div><b>${taskId}</b><br><small style="color:var(--muted)">Repaired Location</small></div><span style="color:var(--accent)">${timeLabel}</span></div>`);

    // set worker back to available
    toggleStatus(false);

    // reset current finishing task
    currentFinishingTask = null;
  }

  // Accessibility / small fixes: prevent clicks inside modal content from closing modal
  document.querySelectorAll('.modal, .map-modal .box').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
  });

  // INIT: set initial translations and hide finish buttons
  document.querySelectorAll('.btn-finish').forEach(b => b.style.display = 'none');
  applyTranslations('en');
  
  // Protect dashboard and load user info on page load
  window.addEventListener('load', async () => {
    // Clear redirect flag since we successfully loaded the dashboard
    sessionStorage.removeItem('just_redirected');
    
    // Protect dashboard - only workers can access
    const isProtected = await protectDashboard();
    if (!isProtected) {
      return;
    }
    
    // Load worker information
    loadWorkerInfo();
  });

</script>
</body>
</html>
