<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TarFixer — Senior Officer</title>

  <!-- Leaflet & Icons -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <!-- API Client -->
  <script src="../api-client.js"></script>

  <style>
    :root{
      --bg:#0b1220; --card: #152639; --accent: #00e6a8; --muted: #bfcbd6;
      --text-main: #e6f0f2; --border: rgba(255,255,255,0.1);
      --modal-bg: rgba(7,23,40,0.96); --hover: rgba(255,255,255,0.05);
      --btn-text: #002;
    }
    .light-theme {
      --bg: #f0f2f5; --card: #ffffff; --accent: #009970; --muted: #65676b;
      --text-main: #1c1e21; --border: #e4e6eb; --modal-bg: rgba(255,255,255,0.98);
      --hover: #f2f2f2; --btn-text: #fff;
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family: "Segoe UI", Inter, sans-serif; color: var(--text-main); background: var(--bg); min-height:100vh; transition: 0.3s; }
    .leaflet-control-attribution { display: none !important; }

    /* container: smaller sidebar */
    .container{ display:grid; grid-template-columns:200px 1fr; gap:20px; padding:16px; height:100vh; overflow:hidden; }

    /* SETTINGS ROW (compact layout) */
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .settings-row label {
      font-size: 14px;
      color: var(--text-main);
    }

    .settings-row select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-main);
    }

    /* Toggle switch */
    .theme-toggle input {
      display: none;
    }

    .theme-toggle .switch {
      width: 48px;
      height: 24px;
      background: #666;
      border-radius: 24px;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
    }

    .theme-toggle .switch::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      transition: 0.3s;
    }

    .theme-toggle input:checked + .switch {
      background: var(--accent);
    }

    .theme-toggle input:checked + .switch::after {
      transform: translateX(24px);
    }

    /* SIDEBAR */
    .sidebar{ background:var(--card); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:12px; height: 100%; overflow-y: auto; border: 1px solid var(--border); }
    .brand{display:flex;align-items:center;gap:10px; margin-bottom: 6px;}
    .brand .logo{ width:44px;height:44px;border-radius:10px; background:linear-gradient(135deg,var(--accent),#00bcd4); display:flex;align-items:center;justify-content:center; color:#002; font-weight:800; font-size:18px; }
    .stats{display:flex;flex-direction:column;gap:8px}
    .stat{ background:var(--bg); padding:10px;border-radius:10px; display:flex;justify-content:space-between;align-items:center; border: 1px solid var(--border); font-size:13px }
    .filters label{ font-size:13px; color:var(--muted); }
    .filters select{ width:100%; padding:8px; border-radius:8px; border:1px solid var(--border); margin-top:6px; background: var(--bg); color:var(--text-main); outline: none; }
    select option { background-color: var(--card); color: var(--text-main); }
    .actions{display:flex;gap:8px;margin-top:auto}
    .btn{ padding:9px; border-radius:8px; border:none; background:var(--accent); color:var(--btn-text); cursor:pointer; font-weight: 600; flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; font-size:13px; }
    .btn.ghost{ background:transparent; color:var(--text-main); border:1px solid var(--border); }

    /* MAIN */
    .main{ display:flex; flex-direction:column; gap:12px; height: 100%; overflow: hidden; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .search input{ width: 100%; padding:10px; border-radius:10px; border:none; background:var(--card); color:var(--text-main); min-width: 200px; }
    .officer-profile { display:flex; gap:10px; align-items:center; background: var(--card); padding: 6px 10px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .dropdown-menu { position: absolute; top: 110%; right: 0; width: 200px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 100; padding: 8px; }
    .dropdown-menu.show { display: block; }
    .dropdown-item { padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .dropdown-item:hover { background: var(--hover); }

    /* content: reports take full width; map removed from layout */
    .content{ display:flex; flex-direction:column; gap:12px; flex:1; min-height: 0; overflow:auto; }
    .reports-list{ background:var(--card); border-radius:12px; padding:12px; overflow-y:auto; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }

    .approvals-list{ background:var(--card); border-radius:12px; padding:12px; border:1px solid var(--border); display:flex; flex-direction:column; gap:10px; }
    .approvals-header{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .approvals-header h3{ margin:0; }
    .approval-controls{ display:flex; gap:8px; align-items:center; }
    .approval-controls select{ padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); }
    .approval-status-text{ min-height:18px; font-size:13px; color:var(--muted); }
    .approval-status-text.success{ color:#7ef7a1; }
    .approval-status-text.error{ color:#ff6b6b; }
    .approvals-container{ display:flex; flex-direction:column; gap:10px; }
    .approval-card{ background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .approval-card.processing{ opacity:0.6; pointer-events:none; }
    .approval-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .approval-email{ font-weight:700; }
    .approval-meta{ font-size:12px; color:var(--muted); }
    .pill{ padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase; }
    .pill.pending{ background:rgba(255,193,7,0.12); color:#ffc107; }
    .pill.approved{ background:rgba(0,230,168,0.12); color:#00e6a8; }
    .pill.rejected{ background:rgba(255,87,87,0.12); color:#ff5757; }
    .approval-body{ display:flex; flex-wrap:wrap; gap:12px; font-size:13px; color:var(--muted); }
    .approval-body strong{ color:var(--text-main); }
    .approval-actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .approval-actions .btn-mini.approve{ background:#00e6a8; color:#002; }
    .approval-actions .btn-mini.reject{ background:#ff6b6b; color:#fff; }
    .empty-state{ padding:12px; text-align:center; color:var(--muted); border:1px dashed var(--border); border-radius:10px; }

    /* REPORT CARD */
    .report{ padding:10px; border-radius:10px; background:var(--bg); border: 1px solid var(--border); display:flex; gap:10px; align-items:flex-start; }
    .thumb{ width:76px; height:76px; border-radius:8px; object-fit:cover; background:#000; cursor:pointer; }
    .report-details { flex: 1; min-width: 0; }
    .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .report-id { font-weight: 700; font-size: 13px; }
    .status-pill{ padding:4px 8px; border-radius:6px; font-weight:700; font-size:11px; text-transform: uppercase; }
    .status-new{ background:rgba(255, 193, 7, 0.12); color:#ffc107; }
    .status-assigned{ background:rgba(59, 130, 246, 0.12); color:#60a5fa; }
    .status-done{ background:rgba(255, 64, 129, 0.12); color:#ff4081; }
    .status-resolved{ background:rgba(0, 230, 168, 0.12); color:#00e6a8; }
    .report-actions { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items:center; }
    .btn-mini { padding: 6px 10px; font-size: 13px; border-radius: 8px; cursor: pointer; border: none; font-weight: 700; }

    /* DETAILS MODAL */
    .modal-back { position: fixed; inset: 0; background: var(--modal-bg); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--card); width: 100%; max-width: 880px; padding: 14px; border-radius: 12px; border: 1px solid var(--border); display:flex; gap:12px; flex-direction:column; max-height: 90vh; overflow:auto; }
    .detail-top{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .images-row{ display:flex; gap:12px; align-items:stretch; }
    .detail-img{ width:48%; height: 320px; object-fit:cover; border-radius:8px; background:#111; border:1px solid var(--border); }
    .map-small{ width:100%; height:300px; border-radius:8px; border:1px solid var(--border); overflow:hidden; }
    .close-btn{ background:rgba(0,0,0,0.6); color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; }

    .worker-item {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }

    .worker-item:hover {
      background: var(--hover);
    }

    .worker-status {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-avail {
      background: rgba(0, 230, 168, 0.15);
      color: #00e6a8;
    }

    .status-busy {
      background: rgba(255, 0, 0, 0.15);
      color: #ff5b5b;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    @media(max-width:900px){ .container{grid-template-columns:1fr; height:auto; overflow:visible} .detail-img{ height:200px; width:100% } .modal{ padding:12px; } }
  </style>
</head>
<body>

<div class="container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">TF</div>
      <div>
        <h2 style="margin:0; font-size:16px">TarFixer</h2>
        <div style="font-size:12px;color:var(--muted)" data-key="role">Senior Officer</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div data-key="statNew">New</div><div id="stat-new">0</div></div>
      <div class="stat"><div data-key="statHigh">High</div><div id="stat-severe">0</div></div>

    </div>

    <div class="filters">
      <label data-key="filterStatus">Status</label>
      <select id="statusFilter" onchange="renderReports()">
        <option value="all">All</option>

        <option value="assigned">Assigned</option>
        <option value="done">Work Done</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn" onclick="renderReports()"><i class="fa-solid fa-rotate"></i></button>
      <button class="btn ghost" id="exportBtn"><i class="fa-solid fa-download"></i></button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="search" style="flex:1; margin-right:12px;"><input id="searchInput" placeholder="Search ID, Road, Worker..." oninput="renderReports()"></div>
      <div class="officer-profile" onclick="document.getElementById('profileDropdown').classList.toggle('show')">
        <div style="text-align:right">
          <div style="font-weight:700; font-size: 14px;" id="officerName">Officer</div>
          <div style="font-size:11px;color:var(--muted)" id="officerEmail">Zone 4 - Senior</div>
        </div>
        <div style="width:34px;height:34px;border-radius:8px;background:#3b82f6;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;" id="officerInitials">O</div>
        <div class="dropdown-menu" id="profileDropdown">
          <div class="dropdown-item" onclick="document.getElementById('settingsModal').style.display='flex'"><i class="fa-solid fa-gear"></i> Settings</div>
          <div class="dropdown-item" style="color:#ff3b3b" onclick="handleSignOut()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="reports-list">
        <h3><span data-key="incoming">Reports</span> <span style="font-size:12px;color:var(--muted)" id="listCount">0</span></h3>
        <div id="reportsContainer"></div>
      </div>

      <div class="approvals-list">
        <div class="approvals-header">
          <h3>Access Requests</h3>
          <div class="approval-controls">
            <select id="approvalStatusFilter" onchange="fetchApprovals(this.value)">
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
            <button class="btn-mini" onclick="fetchApprovals(document.getElementById('approvalStatusFilter').value)"><i class="fa-solid fa-rotate"></i></button>
          </div>
        </div>
        <div id="approvalsMessage" class="approval-status-text"></div>
        <div id="approvalsContainer" class="approvals-container">
          <div class="empty-state">Loading approvals...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- DETAILS MODAL (map + two images + actions) -->
<div class="modal-back" id="detailsModal">
  <div class="modal" role="dialog" aria-modal="true" id="detailsContent">
    <div class="detail-top">
      <div>
        <div style="font-weight:800; font-size:16px" id="detailId">TF-XXX</div>
        <div style="font-size:13px; color:var(--muted)" id="detailRoad">Road Name</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="close-btn" onclick="closeDetails()">Close</button>
      </div>
    </div>

    <div class="images-row" id="imagesRow">
      <img id="imgBefore" class="detail-img" alt="Damaged image">
      <img id="imgAfter" class="detail-img" alt="Repaired image" style="display:none">
    </div>

    <div style="margin-top:8px;">
      <div id="mapSmall" class="map-small"></div>
    </div>

    <div style="display:flex; gap:8px; margin-top:10px; justify-content:flex-end;">
      <button id="btnAssign" class="btn ghost" style="display:none" onclick="openAssignModal(currentDetailId)">Assign Worker</button>
      <button id="btnResolve" class="btn" style="display:none" onclick="verifyAndResolve(currentDetailId)">Verify & Resolve</button>

</div>

<!-- WORKER ASSIGN MODAL (same as before) -->
<div class="modal-back" id="workerModal">
  <div class="modal">
    <h3>Assign Worker</h3>
    <p style="font-size:13px; color:var(--muted); margin-bottom:12px;">Select an available worker for Zone 4:</p>
    <div id="workerListContainer"></div>
    <button class="btn ghost" style="width:100%; margin-top:10px;" onclick="document.getElementById('workerModal').style.display='none'">Cancel</button>
  </div>
</div>

<!-- SETTINGS MODAL (language + theme button) -->
<div class="modal-back" id="settingsModal">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">Settings</h3>

    <!-- LANGUAGE -->
    <div class="settings-row">
      <label>Language</label>
      <select id="langSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="ta">தமிழ்</option>
        <option value="te">తెలుగు</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="ml">മലയാളം</option>
        <option value="bn">বাংলা</option>
        <option value="mr">मराठी</option>
      </select>
    </div>

    <!-- THEME -->
    <div class="settings-row">
      <label>Theme</label>
      <div class="theme-toggle">
        <input type="checkbox" id="themeSwitch" onchange="toggleTheme()" />
        <label for="themeSwitch" class="switch"></label>
      </div>
    </div>

    <button class="btn" style="width: 100%; margin-top: 20px;"
      onclick="document.getElementById('settingsModal').style.display='none'">
      Close
    </button>
  </div>
</div>


<script>
// API is already initialized in api-client.js
// const API = new TarFixerAPI();

/* ---------- GEOCODING HELPER ---------- */
// Cache for geocoded addresses to avoid repeated API calls
const geocodeCache = {};

async function reverseGeocode(lat, lng) {
  const cacheKey = `${lat.toFixed(4)},${lng.toFixed(4)}`;
  
  // Check cache first
  if (geocodeCache[cacheKey]) {
    return geocodeCache[cacheKey];
  }
  
  try {
    // Use OpenStreetMap Nominatim (free, no API key needed)
    const response = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=16`,
      { headers: { 'Accept-Language': 'en' } }
    );
    
    if (response.ok) {
      const data = await response.json();
      // Extract readable address
      const address = data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      // Shorten address (take first 3 parts)
      const parts = address.split(',').slice(0, 3).join(',').trim();
      geocodeCache[cacheKey] = parts;
      return parts;
    }
  } catch (error) {
    console.warn('Geocoding failed:', error);
  }
  
  // Fallback to coordinates
  return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
}

/* ---------- REPORTS DATA ---------- */
let reports = [];

// Fetch reports from API
async function fetchReports() {
  try {
    console.log('Fetching reports from API...');
    const data = await API.getReports();
    console.log('Reports received:', data);
    
    if (data && data.reports) {
      reports = data.reports.map(r => {
        // Handle image_data - it may or may not have the data URL prefix
        let imageUrl = '../placeholder.jpg';
        if (r.image_data) {
          if (r.image_data.startsWith('data:image')) {
            imageUrl = r.image_data; // Already has prefix
          } else {
            imageUrl = `data:image/jpeg;base64,${r.image_data}`; // Add prefix
          }
        }
        
        return {
          id: `#${r.id}`,
          rawId: r.id,
          road: `${r.latitude?.toFixed(4) || 0}, ${r.longitude?.toFixed(4) || 0}`,
          lat: r.latitude || 0,
          lng: r.longitude || 0,
          severity: Math.round(r.confidence || 0),
          status: r.status || 'new',
          image: imageUrl,
          assignedTo: r.assigned_worker || r.assigned_to || '',
          damage_type: r.damage_type || 'Unknown',
          timestamp: r.created_at || new Date().toISOString(),
          user_email: r.user_email || 'Anonymous'
        };
      });
      console.log('Parsed reports:', reports);
      renderReports();
      
      // Fetch addresses in background (don't block rendering)
      enrichReportsWithAddresses();
    }
  } catch (error) {
    console.error('Error fetching reports:', error);
  }
}

// Enrich reports with human-readable addresses (runs in background)
async function enrichReportsWithAddresses() {
  for (let i = 0; i < reports.length; i++) {
    const r = reports[i];
    if (r.lat && r.lng) {
      // Add small delay to avoid rate limiting (Nominatim allows 1 req/sec)
      if (i > 0) await new Promise(resolve => setTimeout(resolve, 500));
      
      const address = await reverseGeocode(r.lat, r.lng);
      reports[i].road = address;
    }
  }
  // Re-render with addresses
  renderReports();
}

// Workers - fetched from API
let workers = [];

// Fetch workers from API
async function fetchWorkers() {
  try {
    console.log('Fetching workers from API...');
    const data = await API.getWorkers();
    console.log('Workers received:', data);
    
    if (data && data.workers) {
      workers = data.workers.map(w => ({
        id: w.id,
        name: w.name || w.email,
        email: w.email,
        status: w.status || 'Available',
        zone: w.zone || 'Zone 1',
        activeJobs: w.active_jobs || 0
      }));
      
      if (data.demo) {
        console.log('Using demo workers (no real workers in database)');
      }
      
      renderWorkersList();
    }
  } catch (error) {
    console.error('Error fetching workers:', error);
    // Use fallback demo workers
    workers = [
      { id: '1', name: 'Ramesh K', email: 'ramesh@worker.com', status: 'Available', zone: 'Zone 1' },
      { id: '2', name: 'Suresh M', email: 'suresh@worker.com', status: 'Busy', zone: 'Zone 2' },
      { id: '3', name: 'Abdul R', email: 'abdul@worker.com', status: 'Available', zone: 'Zone 3' },
      { id: '4', name: 'John D', email: 'john@worker.com', status: 'Available', zone: 'Zone 4' }
    ];
    renderWorkersList();
  }
}

// Render workers in the assign modal
function renderWorkersList() {
  const container = document.getElementById('workersList');
  if (!container) return;
  
  container.innerHTML = '';
  workers.forEach(w => {
    const div = document.createElement('div');
    div.className = 'worker-option';
    div.innerHTML = `
      <input type="radio" name="worker" id="worker-${w.id}" value="${w.email || w.name}">
      <label for="worker-${w.id}">
        <strong>${w.name}</strong>
        <span class="worker-status ${w.status === 'Available' ? 'available' : 'busy'}">${w.status}</span>
        <span class="worker-zone">${w.zone}</span>
      </label>
    `;
    container.appendChild(div);
  });
}

let currentDetailId = null;
let approvals = [];

/* MAP: only used inside modal; initialize later when opening modal */
let smallMap = null;
let smallTile = null;

/* RENDER REPORTS LIST (map removed from main UI) */
function renderReports() {
  const container = document.getElementById('reportsContainer');
  container.innerHTML = '';
  const filter = document.getElementById('statusFilter').value;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = reports.filter(r => {
    if(filter !== 'all' && r.status !== filter) return false;
    if(q && !JSON.stringify(r).toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('listCount').textContent = filtered.length;
  document.getElementById('stat-new').textContent = reports.filter(r=>r.status==='new').length;
  document.getElementById('stat-severe').textContent = reports.filter(r=>r.severity>=60).length;
  document.getElementById('stat-resolved').textContent = reports.filter(r=>r.status==='resolved').length;

  filtered.forEach(r => {
    const div = document.createElement('div');
    div.className = 'report';

    let actionHtml = '';
    if(r.status === 'new') actionHtml = `<button class="btn-mini" style="background:#3b82f6;color:#fff" onclick="openAssignModal('${r.id}')">Assign</button> <button class="btn-mini" style="background:#ff9800;color:#fff" onclick="openDetails('${r.id}')">View Details</button>`;
    else if(r.status === 'assigned') actionHtml = `<span style="font-size:13px;color:var(--muted)">Assigned: ${r.assignedTo}</span> <button class="btn-mini" style="background:#ff9800;color:#fff" onclick="openDetails('${r.id}')">View Details</button>`;
    else if(r.status === 'done') actionHtml = `<button class="btn-mini" style="background:#00e6a8;color:#002" onclick="openDetails('${r.id}')">Verify & Resolve</button>`;
    else actionHtml = `<span style="font-size:13px;color:var(--accent)">Resolved</span> <button class="btn-mini" style="background:#ff9800;color:#fff" onclick="openDetails('${r.id}')">View Details</button>`;

    div.innerHTML = `
      <img src="${r.image}" class="thumb" onclick="openDetails('${r.id}')">
      <div class="report-details">
        <div class="report-header">
          <div class="report-id">${r.id}</div>
          <div class="status-pill status-${r.status}">${r.status.toUpperCase()}</div>
        </div>
        <div style="font-size:13px;color:var(--muted)">${r.road}</div>
        <div class="report-actions">
          <div style="font-weight:800; color:${r.severity>=60? '#ff3b3b': r.severity>=30? '#ffbf00': '#00e6a8'}">${r.severity}% DMG</div>
          <div style="flex:1"></div>
          ${actionHtml}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function setApprovalsMessage(message, variant = '') {
  const el = document.getElementById('approvalsMessage');
  if (!el) return;
  el.textContent = message || '';
  el.className = 'approval-status-text' + (variant ? ` ${variant}` : '');
}

function formatRelativeTime(timestamp) {
  if (!timestamp) return 'time unknown';
  const date = new Date(timestamp);
  if (Number.isNaN(date.getTime())) return timestamp;
  const seconds = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function formatDateTime(timestamp) {
  if (!timestamp) return '—';
  const date = new Date(timestamp);
  return Number.isNaN(date.getTime()) ? timestamp : date.toLocaleString();
}

function renderApprovals() {
  const container = document.getElementById('approvalsContainer');
  if (!container) return;
  if (!approvals.length) {
    container.innerHTML = '<div class="empty-state">No requests for this filter.</div>';
    return;
  }

  container.innerHTML = '';
  approvals.forEach(entry => {
    const requestedAgo = formatRelativeTime(entry.requested_at || entry.approved_at);
    const requestedOn = formatDateTime(entry.requested_at);
    const statusClass = entry.status ? entry.status.toLowerCase() : 'pending';
    const roleLabel = (entry.user_type || '').toUpperCase();

    const card = document.createElement('div');
    card.className = 'approval-card';
    card.dataset.approvalId = entry.id;
    card.innerHTML = `
      <div class="approval-header">
        <div>
          <div class="approval-email">${entry.email}</div>
          <div class="approval-meta">${roleLabel} • ${requestedAgo}</div>
        </div>
        <span class="pill ${statusClass}">${(entry.status || 'pending').toUpperCase()}</span>
      </div>
      <div class="approval-body">
        <div><strong>Phone:</strong> ${entry.phone || '—'}</div>
        <div><strong>Requested:</strong> ${requestedOn}</div>
      </div>
    `;

    if (entry.status !== 'pending' && entry.approved_by) {
      const reviewed = document.createElement('div');
      reviewed.className = 'approval-meta';
      reviewed.textContent = `Reviewed by ${entry.approved_by} on ${formatDateTime(entry.approved_at)}`;
      card.appendChild(reviewed);
    }

    if (entry.status === 'pending') {
      const actions = document.createElement('div');
      actions.className = 'approval-actions';
      actions.innerHTML = `
        <button class="btn-mini approve" onclick="handleApprovalAction(${entry.id}, 'approve')">Approve</button>
        <button class="btn-mini reject" onclick="handleApprovalAction(${entry.id}, 'reject')">Reject</button>
      `;
      card.appendChild(actions);
    }

    container.appendChild(card);
  });
}

async function fetchApprovals(status = 'pending') {
  const container = document.getElementById('approvalsContainer');
  if (!container) return;
  container.innerHTML = '<div class="empty-state">Loading approvals...</div>';
  setApprovalsMessage('', '');

  try {
    const data = await API.getApprovals(status);
    approvals = data || [];
    renderApprovals();
  } catch (error) {
    console.error('Failed to load approvals:', error);
    container.innerHTML = '<div class="empty-state">Unable to load approvals.</div>';
    setApprovalsMessage(error.message || 'Failed to load approvals', 'error');
  }
}

async function handleApprovalAction(requestId, action) {
  const card = document.querySelector(`[data-approval-id="${requestId}"]`);
  if (card) card.classList.add('processing');
  setApprovalsMessage('', '');

  try {
    let note = '';
    if (action === 'reject') {
      const promptValue = prompt('Add an optional note for this rejection (optional):', '');
      if (promptValue === null) {
        if (card) card.classList.remove('processing');
        return;
      }
      note = promptValue;
    }

    const response = action === 'approve'
      ? await API.approveRequest(requestId, note)
      : await API.rejectRequest(requestId, note);

    approvals = approvals.filter(entry => entry.id !== requestId);
    renderApprovals();
    const email = response && response.entry && response.entry.email ? response.entry.email : 'Request';
    setApprovalsMessage(`${email} ${action === 'approve' ? 'approved' : 'rejected'} successfully`, 'success');
  } catch (error) {
    console.error('Approval update failed:', error);
    setApprovalsMessage(error.message || 'Unable to update request', 'error');
  } finally {
    if (card) card.classList.remove('processing');
  }
}

/* DETAILS modal */
function openDetails(id) {
  const r = reports.find(x => x.id === id);
  if (!r) return;
  currentDetailId = id;

  document.getElementById('detailId').textContent = r.id;
  document.getElementById('detailRoad').textContent = r.road;

  // BEFORE IMAGE (always from user)
  document.getElementById('imgBefore').src = r.image;

  // AFTER IMAGE (worker)
  const imgAfterEl = document.getElementById('imgAfter');
  imgAfterEl.style.display = 'block';
  if (r.afterImage) {
    imgAfterEl.src = r.afterImage;
  } else {
    imgAfterEl.src = "https://via.placeholder.com/600x400/222/fff?text=Worker+Has+Not+Uploaded";
  }

  // show/hide buttons based on status
  document.getElementById('btnAssign').style.display = r.status === 'new' ? 'inline-flex' : 'none';
  document.getElementById('btnResolve').style.display = r.status === 'done' ? 'inline-flex' : 'none';

  // show modal
  document.getElementById('detailsModal').style.display = 'flex';

  // init or update small map
  setTimeout(() => {
    if (smallMap) {
      try { smallMap.remove(); } catch(e) {}
      smallMap = null;
      document.getElementById('mapSmall').innerHTML = '';
    }
    smallMap = L.map('mapSmall', { attributionControl: false, zoomControl: false }).setView([r.lat, r.lng], 15);
    const url = document.body.classList.contains('light-theme') ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    smallTile = L.tileLayer(url, { maxZoom: 19 }).addTo(smallMap);
    L.circleMarker([r.lat, r.lng], { radius: 8, fillColor: '#ff9800', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(smallMap).bindPopup(r.id);
    setTimeout(()=> smallMap.invalidateSize(), 80);
  }, 80);
}

function closeDetails() {
  document.getElementById('detailsModal').style.display = 'none';
  if (smallMap) {
    try { smallMap.remove(); } catch(e) {}
    smallMap = null;
    document.getElementById('mapSmall').innerHTML = '';
  }
  currentDetailId = null;
}

/* ASSIGN WORKER (same modal flow) */
let currentReportIdToAssign = null;
function openAssignModal(id) {
  currentReportIdToAssign = id;
  const container = document.getElementById('workerListContainer');
  container.innerHTML = '';
  const available = workers.filter(w => w.status === 'Available');
  if (!available.length) {
    container.innerHTML = '<div style="color:var(--muted);padding:8px">No workers available.</div>';
  } else {
    available.forEach(w => {
      const div = document.createElement('div');
      div.className = 'worker-item';
      div.innerHTML = `<div><div style="font-weight:700">${w.name}</div><div style="font-size:12px;color:var(--muted)">${w.zone}</div></div><div class="worker-status status-avail">Available</div>`;
      div.onclick = ()=> assignWorker(w.email || w.name, w.name);
      container.appendChild(div);
    });
  }
  document.getElementById('workerModal').style.display = 'flex';
}

async function assignWorker(workerEmail, workerName) {
  if (!currentReportIdToAssign) return; // safety
  
  try {
    // Get the raw report ID (without # prefix)
    const rawId = currentReportIdToAssign.replace('#', '');
    
    // Call API to assign worker
    await API.assignReport(rawId, workerEmail);
    
    // Update local state
    reports = reports.map(r => r.id === currentReportIdToAssign ? {...r, status: 'assigned', assignedTo: workerName} : r);
    document.getElementById('workerModal').style.display = 'none';
    renderReports();
    
    console.log(`✅ Assigned ${workerName} to report ${rawId}`);
  } catch (error) {
    console.error('Failed to assign worker:', error);
    alert('Failed to assign worker: ' + error.message);
  }
}

/* VERIFY & RESOLVE by officer (when status 'done') */
function verifyAndResolve(id) {
  if (!confirm('Confirm repairs are satisfactory? This will mark the report as resolved and notify the user.')) return;
  // set resolved and keep afterImage (should already be there if worker uploaded)
  reports = reports.map(r => r.id === id ? {...r, status: 'resolved'} : r);
  closeDetails();
  renderReports();
}

/* EXPORT */
document.getElementById('exportBtn').onclick = () => {
  const a = document.createElement('a');
  a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(reports, null, 2));
  a.download = "Officer_Reports.json";
  a.click();
};

  if (sw) sw.checked = document.body.classList.contains('light-theme');
}

function changeLanguage(lang) {
  const map = TRANSLATIONS[lang] || TRANSLATIONS['en'];
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (map[k]) el.textContent = map[k];
  });
}

/* Prevent background clicks from closing modals unintentionally */
document.querySelectorAll('.modal-back').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.style.display = 'none'; });
});
/* Make inner modal content stop propagation (prevents accidental close) */
document.querySelectorAll('.modal').forEach(el => el.addEventListener('click', e => e.stopPropagation()));

// Prevent worker and settings modals from closing when clicking inside
const workerModalEl = document.getElementById('workerModal');
if (workerModalEl) workerModalEl.addEventListener('click', function(e){ e.stopPropagation(); });
const settingsModalEl = document.getElementById('settingsModal');
if (settingsModalEl) settingsModalEl.addEventListener('click', function(e){ e.stopPropagation(); });

/* SECURE AUTHENTICATION & USER INFO */
function getSession() {
  try {
    const sessionStr = localStorage.getItem('tarfixer_session');
    if (!sessionStr) return null;
    const signedSession = JSON.parse(sessionStr);
    // Extract actual session data from signed wrapper
    return signedSession.data || signedSession;
  } catch (e) {
    return null;
  }
}

async function handleSignOut() {
  if (confirm('Are you sure you want to sign out?')) {
    await API.logout();
    window.location.href = '../Login/Choose_login.html';
  }
}

function loadUserInfo() {
  const user = API.getUser();
  if (user) {
    document.getElementById('officerName').textContent = user.name || 'Officer';
    document.getElementById('officerEmail').textContent = user.email || '';
    const initials = user.name ? user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'O';
    document.getElementById('officerInitials').textContent = initials;
  }
}

async function protectDashboard() {
  // Check if authenticated
  if (!API.isAuthenticated()) {
    console.warn('Not authenticated, redirecting to login');
    window.location.replace('../Login/Choose_login.html?error=not_authenticated');
    return false;
  }

  // Check user type from stored data first
  const user = API.getUser();
  if (!user || user.userType !== 'officer') {
    console.warn('Access denied: not an officer');
    await API.logout();
    window.location.replace('../Login/Choose_login.html?error=access_denied');
    return false;
  }

  // Validate session with backend (non-blocking)
  try {
    const session = await API.validateSession();
    if (!session || !session.user || session.user.user_type !== 'officer') {
      console.error('Session validation failed or user type mismatch');
      await API.logout();
      window.location.replace('../Login/Choose_login.html?error=session_invalid');
      return false;
    }
  } catch (error) {
    console.error('Session validation error:', error);
    await API.logout();
    window.location.replace('../Login/Choose_login.html?error=session_expired');
    return false;
  }

  console.log('Officer authenticated, loading dashboard...');
  return true;
}

/* INIT */
window.addEventListener('load', async () => {
  // Clear redirect flag since we successfully loaded the dashboard
  sessionStorage.removeItem('just_redirected');
  
  // Protect dashboard - only officers can access
  const isProtected = await protectDashboard();
  if (!isProtected) {
    return;
  }
  
  // Load user information
  loadUserInfo();
  
  // Fetch and render reports from API
  await fetchReports();
  
  // Fetch workers from API
  await fetchWorkers();

  const approvalFilterEl = document.getElementById('approvalStatusFilter');
  const defaultApprovalStatus = approvalFilterEl ? approvalFilterEl.value : 'pending';
  await fetchApprovals(defaultApprovalStatus);

  // sync toggle with theme
  const sw = document.getElementById('themeSwitch');
  if (sw) sw.checked = document.body.classList.contains('light-theme');
});
